# RTK TOML filter for brew output — appended to ~/Library/Application Support/rtk/filters.toml
# Format: https://github.com/innobead/rtk#custom-toml-filters

[filters.brew-install]
description = "Strip brew install download noise"
match_command = "^brew install\\b"
strip_ansi = true
strip_lines_matching = [
    "^==> (Downloading|Pouring|Fetching|Checking)",
    "^Already downloaded:",
    "^\\s*$",
]
max_lines = 20

[filters.brew-list]
description = "Truncate brew list output"
match_command = "^brew list\\b"
strip_ansi = true
strip_lines_matching = ["^\\s*$"]
max_lines = 50

[filters.brew-info]
description = "Strip brew info boilerplate"
match_command = "^brew info\\b"
strip_ansi = true
strip_lines_matching = ["^(From:|Analytics:|Install:|Build Error|HEAD)"]
max_lines = 30
