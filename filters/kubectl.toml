# RTK TOML filter for kubectl — appended to ~/Library/Application Support/rtk/filters.toml
# Supplements the built-in rtk kubectl command

[filters.kubectl-describe]
description = "Strip kubectl describe noise (tolerations, annotations)"
match_command = "^kubectl describe\\b"
strip_ansi = true
strip_lines_matching = [
    "^  (Tolerations|Node-Selectors|Annotations):",
    "^\\s+<none>$",
    "^\\s{10,}",
    "^Events:\\s*$",
]
max_lines = 80

[filters.kubectl-get]
description = "Truncate kubectl get output"
match_command = "^kubectl get\\b"
strip_ansi = true
strip_lines_matching = ["^\\s*$"]
max_lines = 100
