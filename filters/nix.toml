# RTK TOML filter for nix output — appended to ~/Library/Application Support/rtk/filters.toml

[filters.nix-build]
description = "Strip nix build/fetch noise"
match_command = "^nix build\\b"
strip_ansi = true
strip_lines_matching = [
    "^(copying path|fetching|downloading|unpacking|patching|building|installing|post-installation)",
    "^these .* will be",
    "^(warning:|note:).*already",
    "^\\s*$",
]
max_lines = 30

[filters.nix-develop]
description = "Strip nix develop noise"
match_command = "^nix develop\\b"
strip_ansi = true
strip_lines_matching = [
    "^(copying|fetching|building|warning:)",
    "^\\s*$",
]
max_lines = 20

[filters.nix-store]
description = "Strip nix-store copy output"
match_command = "^nix-store\\b"
strip_ansi = true
strip_lines_matching = [
    "^copying path",
    "^\\s*$",
]
max_lines = 50
